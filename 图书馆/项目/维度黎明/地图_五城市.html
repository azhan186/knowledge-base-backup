<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>五城市地图 - 维度黎明</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0a0a1a;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Noto Serif SC', serif;
            color: #e0e0e0;
            padding: 20px;
        }
        h1 { font-size: 1.5em; color: #6366f1; margin-bottom: 5px; text-align: center; }
        .subtitle { color: #888; font-size: 0.85em; margin-bottom: 25px; text-align: center; }
        
        .map { position: relative; width: 500px; height: 400px; }
        .city-circle {
            position: absolute;
            border-radius: 50%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-size: 0.85em;
        }
        .city-circle span { text-align: center; line-height: 1.3; }
        .city-circle small { font-size: 0.7em; opacity: 0.7; }
        
        /* 临江市更靠近亚特兰蒂斯 */
        .city-临江 { width: 80px; height: 80px; background: rgba(244, 114, 182, 0.2); border: 2px solid #f472b6; left: 120px; top: 180px; color: #f472b6; }
        /* 溶岩城在右侧，偏上 */
        .city-溶岩 { width: 70px; height: 70px; background: rgba(249, 115, 22, 0.2); border: 2px solid #f97316; left: 360px; top: 150px; color: #f97316; }
        /* 光明市在上方 */
        .city-光明 { width: 70px; height: 70px; background: rgba(251, 191, 36, 0.2); border: 2px solid #fbbf24; left: 215px; top: 60px; color: #fbbf24; }
        /* 临渊城在下方 */
        .city-临渊 { width: 70px; height: 70px; background: rgba(129, 140, 248, 0.2); border: 2px solid #818cf8; left: 215px; top: 280px; color: #818cf8; }
        /* 亚特兰蒂斯在临渊城上方，相切 */
        .city-亚特兰蒂斯 { width: 80px; height: 80px; background: rgba(125, 211, 252, 0.15); border: 2px dashed #7dd3fc; left: 215px; top: 200px; color: #7dd3fc; }
        
        /* 海沟在亚特兰蒂斯和临渊城相切处 */
        .depth-line {
            position: absolute;
            left: 285px;
            top: 280px;
            bottom: 120px;
            width: 1px;
            background: linear-gradient(180deg, #818cf8 0%, #7dd3fc 100%);
            opacity: 0.5;
        }
        
        .dir { position: absolute; color: #555; font-size: 0.8em; }
        .dir-n { top: 15px; left: 50%; transform: translateX(-50%); }
        .dir-s { bottom: 15px; left: 50%; transform: translateX(-50%); }
        .dir-w { left: 15px; top: 50%; transform: translateY(-50%); }
        .dir-e { right: 15px; top: 50%; transform: translateY(-50%); }
        
        .legend { margin-top: 25px; display: flex; gap: 25px; flex-wrap: wrap; justify-content: center; font-size: 0.8em; }
        .legend-item { display: flex; align-items: center; gap: 6px; }
        .legend-dot { width: 10px; height: 10px; border-radius: 50%; }
    </style>
</head>
<body>
    <h1>五城市地理位置</h1>
    <p class="subtitle">维度黎明世界观</p>
    
    <div class="map">
        <span class="dir dir-n">北</span>
        <span class="dir dir-s">南</span>
        <span class="dir dir-w">西</span>
        <span class="dir dir-e">东</span>
        
        <div class="city-circle city-临江"><span>临江市</span><small>主舞台</small></div>
        <div class="city-circle city-光明"><span>光明市</span><small>上方</small></div>
        <div class="city-circle city-溶岩"><span>溶岩城</span><small>右侧</small></div>
        <div class="city-circle city-临渊"><span>临渊城</span><small>陆地</small></div>
        <div class="city-circle city-亚特兰蒂斯"><span>亚特兰蒂斯</span><small>海沟深处</small></div>
        
        <div class="depth-line"></div>
        <span style="position:absolute;left:292px;top:240px;color:#5bb8e0;font-size:0.7em;">海沟</span>
    </div>
    
    <div class="legend">
        <div class="legend-item"><div class="legend-dot" style="background:#f472b6;"></div>临江市</div>
        <div class="legend-item"><div class="legend-dot" style="background:#fbbf24;"></div>光明市</div>
        <div class="legend-item"><div class="legend-dot" style="background:#f97316;"></div>溶岩城</div>
        <div class="legend-item"><div class="legend-dot" style="background:#818cf8;"></div>临渊城</div>
        <div class="legend-item"><div class="legend-dot" style="background:#7dd3fc;border:1px dashed #7dd3fc;"></div>亚特兰蒂斯</div>
    </div>
</body>
</html>
